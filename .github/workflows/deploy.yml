name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install YC CLI
      run: |
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i ~/yc
        echo "$HOME/yc/bin" >> $GITHUB_PATH
    
    - name: Auth to Yandex Cloud
      run: |
        # Сохраняем JSON без изменений
        echo '${{ secrets.YC_SA_JSON_CONTENT }}' > /tmp/key.json
        # Убираем возможные лишние кавычки в начале и конце
        sed -i '1s/^"//; $s/"$//' /tmp/key.json
        # Проверяем, что это валидный JSON
        cat /tmp/key.json | head -5
        yc config set service-account-key /tmp/key.json
        yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
        yc config list
    
    - name: Configure Docker
      run: |
        yc container registry configure-docker
    
    - name: Build and push Docker image
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          TAG=${GITHUB_REF#refs/tags/}
        else
          TAG=${GITHUB_SHA::8}
        fi
        
        docker build -t cr.yandex/$REGISTRY_ID/diplom-app:$TAG .
        docker tag cr.yandex/$REGISTRY_ID/diplom-app:$TAG cr.yandex/$REGISTRY_ID/diplom-app:latest
        docker push cr.yandex/$REGISTRY_ID/diplom-app --all-tags
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" > /tmp/kubeconfig.yaml
        export KUBECONFIG=/tmp/kubeconfig.yaml
        kubectl cluster-info
    
    - name: Deploy to Kubernetes
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        export KUBECONFIG=/tmp/kubeconfig.yaml
        TAG=${GITHUB_REF#refs/tags/}
        kubectl set image deployment/diplom-app app=cr.yandex/$REGISTRY_ID/diplom-app:$TAG --record
        kubectl rollout status deployment/diplom-app
